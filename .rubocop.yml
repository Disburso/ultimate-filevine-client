plugins:
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.2
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - "vendor/**/*"
    - "bin/**/*"

Layout/LineLength:
  Max: 120

# Match the conventional `bundle gem` template and this codebase's style.
Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

Metrics/BlockLength:
  Exclude:
    - "*.gemspec"
    - "Rakefile"
    - "spec/**/*"

Metrics/MethodLength:
  Max: 20

Metrics/AbcSize:
  Max: 20

# These perform a side effect and return true on success; they are not queries.
Naming/PredicateMethod:
  AllowedMethods:
    - delete
    - delete_path
    - delete_batch
    - remove_tag
    - toggle_section_visibility

# Keyword-argument constructors (e.g. Configuration) are idiomatic and clear.
Metrics/ParameterLists:
  CountKeywordArgs: false

# One class/module per file; documented public API is a docs concern, not a lint gate.
Style/Documentation:
  Enabled: false

RSpec/ExampleLength:
  Enabled: false

RSpec/MultipleExpectations:
  Enabled: false
